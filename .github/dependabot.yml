version: 2
updates:
  - package-ecosystem: npm
    directory: /mobile
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      expo-sdk:
        patterns:
          - expo*
          - "@expo/*"
          - babel-preset-expo
      react-native:
        patterns:
          - react-native*
          - "@react-native/*"
    ignore:
      - dependency-name: expo
        update-types: [version-update:semver-major]
      - dependency-name: react-native
        update-types: [version-update:semver-major]

  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
    ignore:
      - dependency-name: paddlepaddle
        update-types: [version-update:semver-major]
      - dependency-name: paddleocr
        update-types: [version-update:semver-major]
