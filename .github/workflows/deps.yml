name: Dependencies

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  mobile:
    name: Mobile lint (locked)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
      - run: npm run lint

  backend:
    name: Backend tests (locked)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install locked dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt
      - name: Run tests
        env:
          SYNC_PROCESS: "true"
          SKIP_VISION: "true"
          SKIP_PADDLEOCR: "true"
          PYTHONPATH: .
        run: pytest backend/tests -q

  lock-freshness:
    name: Lock files up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check mobile lock
        working-directory: mobile
        run: npm ci
      - name: Check Python locks
        run: |
          pip install pip-tools==7.5.3
          cd backend
          pip-compile --resolver=backtracking --strip-extras --dry-run -o requirements.txt requirements.in
          pip-compile --resolver=backtracking --strip-extras --dry-run -o requirements-dev.txt requirements-dev.in
